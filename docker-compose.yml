services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      ENVIRONMENT: production
      DATA_DIR: /app/data/raw
      FALLBACK_DATA_DIR: /app/data/raw
      MODEL_DIR: /app/models
      PROCESSED_DATA_DIR: /app/data/processed
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data/processed:/app/data/processed
      - ../train_details.csv:/app/data/raw/train_details.csv:ro
      - ../station_full_names.csv:/app/data/raw/station_full_names.csv:ro
      - ../combined_schedule.csv:/app/data/raw/combined_schedule.csv:ro
      - ../combined_delay.csv:/app/data/raw/combined_delay.csv:ro

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"
